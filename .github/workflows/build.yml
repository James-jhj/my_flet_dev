name: Build Flet Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-audio lunardate requests mutagen zhdate openpyxl chinese-calendar pyjnius android-notify

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' main.py)
          VERSION_CODE=$(grep -oP 'APP_VERSION_CODE = \K\d+' main.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "从 main.py 读取到版本: $VERSION, 版本号: $VERSION_CODE"

      - name: Create pyproject.toml
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "event_reminder"
          version = "${{ steps.version.outputs.version }}"
          description = "事件提醒助手"
          requires-python = ">=3.9"
          dependencies = [
              "flet",
              "flet-audio",
              "lunardate",
              "requests",
              "mutagen",
              "zhdate",
              "openpyxl",
              "chinese-calendar",
              "pyjnius",
              "android-notify",
          ]

          [tool.flet]
          org = "com.jianghuajie"
          product = "事件提醒助手"
          assets_dir = "assets"
          android_adaptive_icon_background = "#ffffff"  # 白色背景，可按需修改

          [tool.flet.flutter]
          dependencies = ["flet_audio"]

          [tool.flet.android.permission]
          # ========== 其他权限 ==========
          "android.permission.READ_MEDIA_AUDIO" = true
          "android.permission.READ_EXTERNAL_STORAGE" = true
          "android.permission.INTERNET" = true
          "android.permission.WAKE_LOCK" = true
          "android.permission.FOREGROUND_SERVICE" = true
          "android.permission.POST_NOTIFICATIONS" = true
          "android.permission.VIBRATE" = true

          [tool.flet.android]
          foreground_service_type = "mediaPlayback"  # 或其他类型
          EOF

      - name: 恢复签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-key.jks
          ls -la android-key.jks
          keytool -list -v -keystore android-key.jks -storepass ${{ secrets.KEYSTORE_PASSWORD }} | head -20
          echo "签名密钥已恢复"

      # ========== 关键：先构建 APK ==========
      - name: 执行 APK 构建
        run: |
          # 确保 .flet 目录被正确复制
          if [ -d ".flet" ]; then
            echo "✅ .flet 目录存在"
            ls -la .flet/android/
          else
            echo "❌ .flet 目录不存在"
            exit 1
          fi
          export FLET_APP_NAME="事件提醒助手"
          flet build apk --yes

      # ========== 然后设置签名工具 ==========
      - name: Set up Android SDK Build-Tools
        run: |
          wget -q https://dl.google.com/android/repository/build-tools_r34-linux.zip
          unzip -q build-tools_r34-linux.zip
          APKSIGNER_PATH=$(find . -name "apksigner" -type f | head -1)
          echo "APKSIGNER_PATH=$APKSIGNER_PATH" >> $GITHUB_ENV
          echo "Found apksigner at: $APKSIGNER_PATH"

      # ========== 最后签名 ==========
      - name: Sign APK with apksigner (V1+V2+V3)
        run: |
          APK_PATH="./build/apk/event_reminder.apk"
          
          # 检查 APK 是否存在
          if [ ! -f "$APK_PATH" ]; then
            echo "错误：APK 文件不存在 - $APK_PATH"
            exit 1
          fi
          
          echo "Signing APK: $APK_PATH"

          # 从 Secrets 读取密码
          KEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          
          $APKSIGNER_PATH sign \
            --ks android-key.jks \
            --ks-pass pass:"$KEYSTORE_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK_PATH"
          
          echo "Verifying APK signature:"
          $APKSIGNER_PATH verify --verbose "$APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: event_reminder_v${{ steps.version.outputs.version }}
          path: ./build/apk/event_reminder.apk
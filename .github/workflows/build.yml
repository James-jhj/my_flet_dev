name: Build Flet Android APK
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flet flet-audio lunardate requests mutagen zhdate openpyxl chinese-calendar pyjnius android-notify

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION = "\K[^"]+' main.py)
          VERSION_CODE=$(grep -oP 'APP_VERSION_CODE = \K\d+' main.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "从 main.py 读取到版本: $VERSION, 版本号: $VERSION_CODE"

      - name: Create pyproject.toml
        run: |
          cat > pyproject.toml << 'EOF'
          [project]
          name = "event_reminder"
          version = "${{ steps.version.outputs.version }}"
          description = "事件提醒助手"
          requires-python = ">=3.9"
          dependencies = [
              "flet",
              "flet-audio",
              "lunardate",
              "requests",
              "mutagen",
              "zhdate",
              "openpyxl",
              "chinese-calendar",
              "pyjnius",
              "android-notify",
          ]

          [tool.flet]
          org = "com.jianghuajie"
          product = "事件提醒助手"
          assets_dir = "assets"
          android_adaptive_icon_background = "#ffffff"  # 白色背景，可按需修改

          [tool.flet.flutter]
          dependencies = ["flet_audio"]
          
          [tool.flet.android]
          "android.foreground_service" = true
          # 关键：指定服务类型为 mediaPlayback
          "android.foreground_service_type" = "mediaPlayback"
          "android.foreground_service.title" = "🎵 事件提醒助手"
          "android.foreground_service.text" = "正在播放音乐"
          "android.foreground_service.start_sticky" = true

          [tool.flet.android.permission]
          # ========== 其他权限 ==========
          "android.permission.READ_MEDIA_AUDIO" = true
          "android.permission.READ_EXTERNAL_STORAGE" = true
          "android.permission.INTERNET" = true
          "android.permission.WAKE_LOCK" = true
          "android.permission.FOREGROUND_SERVICE" = true
          "android.permission.POST_NOTIFICATIONS" = true
          "android.permission.VIBRATE" = true
          EOF

      - name: 恢复签名密钥
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android-key.jks
          ls -la android-key.jks
          keytool -list -v -keystore android-key.jks -storepass ${{ secrets.KEYSTORE_PASSWORD }} | head -20
          echo "签名密钥已恢复"

      # ========== 关键：先构建 APK ==========
      - name: 执行 APK 构建
        run: |
          export FLET_APP_NAME="事件提醒助手"
          flet build apk --yes

      # ========== 以下是手动激活前台服务的补丁 ==========
      - name: 手动激活前台服务
        run: |
          # 1. 修改 AndroidManifest.xml 添加服务和必要权限
          MANIFEST_PATH="build/flutter/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST_PATH" ]; then
            # 添加前台服务声明（如果不存在）
            if ! grep -q "FletForegroundService" "$MANIFEST_PATH"; then
              sed -i '/<application /a \        <service android:name=".FletForegroundService" android:foregroundServiceType="mediaPlayback" />' "$MANIFEST_PATH"
              echo "✅ AndroidManifest.xml 已修补"
            else
              echo "⚠️ AndroidManifest.xml 已包含服务声明"
            fi
          else
            echo "❌ 未找到 AndroidManifest.xml"
            exit 1
          fi

          # 2. 创建原生服务 Java 文件
          SERVICE_DIR="build/flutter/android/app/src/main/java/org/flet/"
          SERVICE_FILE="${SERVICE_DIR}FletForegroundService.java"
          
          mkdir -p "$SERVICE_DIR"
          cat > "$SERVICE_FILE" << 'EOF'
          package org.flet;

          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Intent;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;

          public class FletForegroundService extends Service {
              private static final String CHANNEL_ID = "flet_foreground_channel";
              private static final int NOTIFICATION_ID = 1001;

              @Override
              public void onCreate() {
                  super.onCreate();
                  createNotificationChannel();
                  startForeground(NOTIFICATION_ID, buildNotification());
              }

              private void createNotificationChannel() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(
                          CHANNEL_ID,
                          "Flet 后台服务",
                          NotificationManager.IMPORTANCE_LOW
                      );
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }
              }

              private Notification buildNotification() {
                  return new NotificationCompat.Builder(this, CHANNEL_ID)
                      .setContentTitle("事件提醒助手")
                      .setContentText("正在运行提醒服务")
                      .setSmallIcon(android.R.drawable.ic_menu_edit)
                      .setPriority(NotificationCompat.PRIORITY_LOW)
                      .build();
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  return START_STICKY;
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          EOF
          echo "✅ FletForegroundService.java 已创建"

          # 3. 在 MainActivity 中启动服务（确保服务随应用启动）
          MAIN_ACTIVITY_PATH="build/flutter/android/app/src/main/java/org/flet/MainActivity.java"
          if [ -f "$MAIN_ACTIVITY_PATH" ]; then
            # 检查是否已添加启动代码
            if ! grep -q "startService" "$MAIN_ACTIVITY_PATH"; then
              # 在 onCreate 方法中添加启动服务的代码
              sed -i '/protected void onCreate(Bundle savedInstanceState) {/a \        startService(new Intent(this, FletForegroundService.class));' "$MAIN_ACTIVITY_PATH"
              echo "✅ MainActivity.java 已修补"
            else
              echo "⚠️ MainActivity.java 已包含服务启动代码"
            fi
          else
            echo "⚠️ 未找到 MainActivity.java"
          fi

          # 4. 添加必要的权限（虽然 pyproject.toml 已加，但再加一次确保万无一失）
          if ! grep -q "FOREGROUND_SERVICE" "$MANIFEST_PATH"; then
            sed -i '/<manifest /a \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST_PATH"
            echo "✅ 权限已添加"
          fi


      # ========== 然后设置签名工具 ==========
      - name: Set up Android SDK Build-Tools
        run: |
          wget -q https://dl.google.com/android/repository/build-tools_r34-linux.zip
          unzip -q build-tools_r34-linux.zip
          APKSIGNER_PATH=$(find . -name "apksigner" -type f | head -1)
          echo "APKSIGNER_PATH=$APKSIGNER_PATH" >> $GITHUB_ENV
          echo "Found apksigner at: $APKSIGNER_PATH"

      # ========== 最后签名 ==========
      - name: Sign APK with apksigner (V1+V2+V3)
        run: |
          APK_PATH="./build/apk/event_reminder.apk"
          
          # 检查 APK 是否存在
          if [ ! -f "$APK_PATH" ]; then
            echo "错误：APK 文件不存在 - $APK_PATH"
            exit 1
          fi
          
          echo "Signing APK: $APK_PATH"

          # 从 Secrets 读取密码
          KEYSTORE_PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          KEY_PASS="${{ secrets.KEY_PASSWORD }}"
          
          $APKSIGNER_PATH sign \
            --ks android-key.jks \
            --ks-pass pass:"$KEYSTORE_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            "$APK_PATH"
          
          echo "Verifying APK signature:"
          $APKSIGNER_PATH verify --verbose "$APK_PATH"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: event_reminder_v${{ steps.version.outputs.version }}
          path: ./build/apk/event_reminder.apk